<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

:root {
    --oro-puro: linear-gradient(90deg, #b38b4d, #f9f1dc, #b38b4d, #ffebad, #b38b4d);
    --oro-solido: #c5a059;
    --negro-lujo: #0a0a0a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
}

body {
    background: radial-gradient(circle at center, #ffffff 0%, #f7e8c3 50%, #d4af37 100%);
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
}

/* DORADO ANIMADO */
.texto-oro {
    background: var(--oro-puro);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: brilloOro 3s linear infinite;
}

@keyframes brilloOro {
    to { background-position: 200% center; }
}

/* NAV */
nav {
    padding: 20px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,10,0.98);
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 3px solid var(--oro-solido);
}

.nav-links a {
    color: white;
    margin-left: 15px;
    font-size: 0.7rem;
    text-decoration: none;
    text-transform: uppercase;
}

/* HERO */
.hero {
    height: 85vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.logo-circular {
    width: 230px;
    height: 230px;
    border-radius: 50%;
    border: 8px double var(--oro-solido);
    background: white;
    box-shadow: 0 0 40px rgba(197,160,89,0.5);
}

/* 🔥 CAMBIO IMPORTANTE: TEXTO NEGRO */
.hero p {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-style: italic;
    color: #000; /* antes era dorado */
    margin: 4px 0;
}

.main-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(2rem, 6vw, 5rem);
    margin: 20px 0;
}

/* TITULO */
.section-title {
    text-align: center;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 2.5rem;
    margin: 25px 0 20px;
}

/* CONTAINER */
.container {
    padding: 0 8% 80px;
}

/* 🔥 AJUSTE SUAVE PARA QUE LAS TARJETAS NO SE VEAN PEQUEÑAS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
}

/* CARDS */
.card {
    position: relative;
    background: var(--negro-lujo);
    border-radius: 30px 0 30px 0;
    overflow: hidden;
    border: 2px solid var(--oro-solido);
}

.card img {
    width: 100%;
    height: 380px;
    object-fit: cover;
}

.card-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 18px;
    text-align: center;
    background: linear-gradient(transparent, rgba(0,0,0,0.95));
}

.card-overlay h2 {
    font-size: 1.1rem;
}

.btn-gold {
    display: inline-block;
    padding: 10px 25px;
    background: var(--oro-puro);
    border-radius: 50px;
    font-size: 0.75rem;
    font-weight: bold;
    text-decoration: none;
}

/* FOOTER */
footer {
    background: var(--negro-lujo);
    color: white;
    padding: 80px 10% 40px;
    text-align: center;
}

.social-icons a {
    color: var(--oro-solido);
    font-size: 2rem;
    margin: 10px;
}

/* RESPONSIVE */
@media (max-width: 768px) {

    .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
    }

    .card img {
        height: 260px;
    }

    .logo-circular {
        width: 160px;
        height: 160px;
    }

    .main-title {
        font-size: 2.2rem;
    }
}

@media (max-width: 480px) {

    .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }

    .container {
        padding: 0 4% 50px;
    }

    .card img {
        height: 180px;
    }

    .card-overlay {
        padding: 12px;
    }

    .card-overlay h2 {
        font-size: 0.95rem;
    }

    .btn-gold {
        font-size: 0.7rem;
        padding: 8px 15px;
    }

    .hero p {
        font-size: 1rem;
    }
}

</style>
</head>
