<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modas Castillo | The Gold Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

:root {
    --oro-puro: linear-gradient(90deg, #b38b4d, #f9f1dc, #b38b4d, #ffebad, #b38b4d);
    --oro-solido: #c5a059;
    --negro-lujo: #0a0a0a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
}

body {
    background: radial-gradient(circle at center, #ffffff 0%, #f7e8c3 50%, #d4af37 100%);
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
}

/* ===== TEXTO ORO ===== */
.texto-oro {
    background: var(--oro-puro);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: brilloOro 3s linear infinite;
}

/* ===== NAV ===== */
nav {
    padding: 20px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,10,0.98);
    position: sticky;
    top: 0;
    border-bottom: 3px solid var(--oro-solido);
}

.nav-links a {
    color: white;
    margin-left: 15px;
    font-size: 0.7rem;
    text-decoration: none;
    text-transform: uppercase;
}

/* ===== HERO ===== */
.hero {
    height: auto; /* 🔥 IMPORTANTE */
    padding: 80px 20px 40px;
    text-align: center;
}

.logo-circular {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 8px double var(--oro-solido);
    background: white;
}

/* ===== TEXTO HERO ===== */
.hero p {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-style: italic;
    color: #8a6d3b;
    margin: 5px 0;
}

/* ===== TITULO ===== */
.main-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(2rem, 6vw, 5rem);
    margin: 20px 0;
}

/* ===== CATEGORÍAS ===== */
.section-title {
    text-align: center;
    font-family: 'Cinzel Decorative';
    font-size: 2.5rem;
    margin: 30px 0;
}

.container {
    padding: 0 8% 80px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

/* ===== CARDS ===== */
.card {
    background: var(--negro-lujo);
    border-radius: 30px 0 30px 0;
    overflow: hidden;
    border: 2px solid var(--oro-solido);
}

.card img {
    width: 100%;
    height: 350px;
    object-fit: cover;
}

/* 🔥 TEXTO NO SE SALE */
.card-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 18px;
    text-align: center;
    background: linear-gradient(transparent, rgba(0,0,0,0.95));
}

.card-overlay h2 {
    font-size: 1.1rem;
}

/* ===== BOTÓN ===== */
.btn-gold {
    padding: 10px 25px;
    background: var(--oro-puro);
    border-radius: 50px;
    font-size: 0.75rem;
    font-weight: bold;
    text-decoration: none;
}

/* ===== REDES ===== */
.social-icons a {
    font-size: 2rem;
    margin: 10px;
    color: var(--oro-solido);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {

    .hero {
        padding: 60px 15px;
    }

    .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }

    .card img {
        height: 250px;
    }
}

@media (max-width: 480px) {

    .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }

    .card img {
        height: 180px;
    }

    .hero p {
        font-size: 1rem;
    }
}

</style>
</head>

<body>

<nav>
    <img src="logo.png" style="height:55px;border-radius:50%;">
    <div class="nav-links">
        <a href="#">Inicio</a>
        <a href="#">Carteras</a>
        <a href="#">Joyeria</a>
        <a href="#">Perfumeria</a>
        <a href="#">Redes</a>
    </div>
</nav>

<!-- HERO (TU TEXTO COMPLETO RESTAURADO) -->
<section class="hero">

    <img src="logo.png" class="logo-circular">

    <h1 class="main-title">
        <span style="color: var(--negro-lujo);">Modas</span>
        <span class="texto-oro">Castillo</span>
    </h1>

    <p>Calidad que se nota</p>
    <p>Tienda Online Hondureña</p>
    <p>Envios a Nivel Nacional en Honduras</p>
    <p>Ubicados en Danli, El Paraiso</p>

</section>

<h2 class="section-title texto-oro">Nuestras Categorías</h2>

<div class="container">
    <div class="grid">

        <div class="card">
            <img src="https://i.pinimg.com/736x/19/03/c3/1903c356d441887803b845e5e5f714cd.jpg">
            <div class="card-overlay">
                <h2 class="texto-oro">Carteras</h2>
                <a href="#" class="btn-gold">Ver Catalogo</a>
            </div>
        </div>

        <div class="card">
            <img src="https://i.pinimg.com/736x/4f/d1/14/4fd114f36131d87bd026d413dc4a0441.jpg">
            <div class="card-overlay">
                <h2 class="texto-oro">Joyería</h2>
                <a href="#" class="btn-gold">Ver Catalogo</a>
            </div>
        </div>

        <div class="card">
            <img src="https://i.pinimg.com/736x/91/67/fa/9167faf8aa792f3a01f14c9951191dbe.jpg">
            <div class="card-overlay">
                <h2 class="texto-oro">Perfumería</h2>
                <a href="#" class="btn-gold">Ver Catalogo</a>
            </div>
        </div>

    </div>
</div>

<footer style="text-align:center;padding:60px;background:#0a0a0a;color:white;">
    <h2 class="texto-oro">Redes Sociales</h2>
    <div class="social-icons">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
    </div>
</footer>

</body>
</html>
